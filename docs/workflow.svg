<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text { fill: #c9d1d9; font-family: monospace; font-size: 14px; }
      .title { fill: #58a6ff; font-weight: bold; font-size: 16px; }
      .box { fill: #161b22; stroke: #30363d; stroke-width: 2; rx: 8; ry: 8; }
      .edge { stroke: #58a6ff; stroke-width: 3; stroke-dasharray: 5,5; fill: none; opacity: 0; }

      .node-code { opacity: 1; animation: fade-out 8s infinite; }
      .node-graph { opacity: 0; animation: fade-in 8s infinite; }
      .edge { animation: draw-edge 8s infinite; }

      @keyframes fade-out {
        0%, 30% { opacity: 1; transform: translateY(0); }
        40%, 100% { opacity: 0; transform: translateY(10px); }
      }
      @keyframes fade-in {
        0%, 40% { opacity: 0; transform: scale(0.9); }
        50%, 90% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; }
      }
      @keyframes draw-edge {
        0%, 50% { opacity: 0; stroke-dashoffset: 100; }
        60%, 90% { opacity: 1; stroke-dashoffset: 0; }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" rx="12" ry="12"/>

  <!-- Messy Codebase (Left Side) -->
  <g class="node-code" transform="translate(50, 50)">
    <text x="0" y="0" class="title">1. Messy Codebase</text>
    <rect x="0" y="20" width="250" height="250" class="box" />
    <text x="20" y="50" class="text" fill="#ff7b72">import</text>
    <text x="75" y="50" class="text">networkx</text>
    <text x="20" y="80" class="text" fill="#ff7b72">class</text>
    <text x="70" y="80" class="text" fill="#d2a8ff">DependencyGraph:</text>
    <text x="40" y="110" class="text" fill="#ff7b72">def</text>
    <text x="75" y="110" class="text" fill="#d2a8ff">add_node</text>
    <text x="140" y="110" class="text">(self, node):</text>
    <text x="60" y="140" class="text">self.graph.add_node(...)</text>

    <text x="20" y="190" class="text" fill="#ff7b72">class</text>
    <text x="70" y="190" class="text" fill="#d2a8ff">Orchestrator:</text>
    <text x="40" y="220" class="text">graph = DependencyGraph()</text>
  </g>

  <!-- Animated Edges (Middle) -->
  <path d="M 330 150 Q 400 50 480 100" class="edge" style="animation-delay: 0.2s;" />
  <path d="M 330 200 Q 400 200 480 200" class="edge" style="animation-delay: 0.4s;" />
  <path d="M 330 250 Q 400 350 480 300" class="edge" style="animation-delay: 0.6s;" />

  <!-- Structured Graph (Right Side) -->
  <g class="node-graph" transform="translate(480, 50)">
    <text x="0" y="0" class="title">2. Machine Queryable Graph</text>

    <!-- Node 1 -->
    <rect x="0" y="30" width="180" height="60" class="box" />
    <text x="15" y="55" class="text" fill="#8b949e">id:</text>
    <text x="45" y="55" class="text" fill="#a5d6ff">"networkx"</text>
    <text x="15" y="75" class="text" fill="#8b949e">type:</text>
    <text x="60" y="75" class="text" fill="#7ee787">"module"</text>

    <!-- Node 2 -->
    <rect x="40" y="130" width="200" height="60" class="box" />
    <text x="55" y="155" class="text" fill="#8b949e">id:</text>
    <text x="85" y="155" class="text" fill="#a5d6ff">"DependencyGraph"</text>
    <text x="55" y="175" class="text" fill="#8b949e">type:</text>
    <text x="100" y="175" class="text" fill="#7ee787">"class"</text>

    <!-- Node 3 -->
    <rect x="80" y="230" width="180" height="60" class="box" />
    <text x="95" y="255" class="text" fill="#8b949e">id:</text>
    <text x="125" y="255" class="text" fill="#a5d6ff">"Orchestrator"</text>
    <text x="95" y="275" class="text" fill="#8b949e">type:</text>
    <text x="140" y="275" class="text" fill="#7ee787">"class"</text>

    <!-- Edges between output nodes -->
    <path d="M 90 90 L 140 130" stroke="#8b949e" stroke-width="2" fill="none" />
    <path d="M 140 190 L 170 230" stroke="#8b949e" stroke-width="2" fill="none" />
  </g>
</svg>
