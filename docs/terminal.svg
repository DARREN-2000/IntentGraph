<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .header { fill: #161b22; }
      .circles { fill: #ff5f56; }
      .circles:nth-child(2) { fill: #ffbd2e; transform: translateX(20px); }
      .circles:nth-child(3) { fill: #27c93f; transform: translateX(40px); }

      .text { fill: #c9d1d9; font-family: monospace; font-size: 14px; white-space: pre; }
      .prompt { fill: #7ee787; font-weight: bold; }

      .typing {
        overflow: hidden;
        white-space: nowrap;
        animation: type 2s steps(40, end) infinite alternate;
      }

      .line1 { opacity: 0; animation: show 8s infinite; animation-delay: 0s; }
      .line2 { opacity: 0; animation: show 8s infinite; animation-delay: 1.5s; }
      .line3 { opacity: 0; animation: show 8s infinite; animation-delay: 2.5s; }
      .line4 { opacity: 0; animation: show 8s infinite; animation-delay: 3s; }
      .line5 { opacity: 0; animation: show 8s infinite; animation-delay: 3.2s; }
      .line6 { opacity: 0; animation: show 8s infinite; animation-delay: 3.4s; }
      .line7 { opacity: 0; animation: show 8s infinite; animation-delay: 3.6s; }
      .line8 { opacity: 0; animation: show 8s infinite; animation-delay: 3.8s; }

      @keyframes type {
        0% { width: 0; }
        50%, 100% { width: 100%; }
      }
      @keyframes show {
        0%, 100% { opacity: 0; }
        5%, 90% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Terminal Window -->
  <rect width="100%" height="100%" class="bg" rx="10" ry="10"/>
  <rect width="100%" height="30" class="header" rx="10" ry="10"/>
  <rect y="20" width="100%" height="10" class="header" /> <!-- Hide bottom rounded corners of header -->

  <circle cx="20" cy="15" r="6" class="circles" />
  <circle cx="20" cy="15" r="6" class="circles" />
  <circle cx="20" cy="15" r="6" class="circles" />

  <!-- Terminal Content -->
  <g transform="translate(20, 60)">
    <g class="line1">
      <text x="0" y="0" class="text"><tspan class="prompt">$ </tspan>intentgraph parse src/ --pretty</text>
    </g>

    <g class="line2">
      <text x="0" y="30" class="text" fill="#58a6ff">Starting analysis of src/...</text>
    </g>

    <g class="line3">
      <text x="0" y="60" class="text" fill="#7ee787">Successfully generated graph:</text>
    </g>

    <g class="line4">
      <text x="0" y="90" class="text">{</text>
    </g>
    <g class="line5">
      <text x="0" y="110" class="text">  "nodes": [</text>
    </g>
    <g class="line6">
      <text x="0" y="130" class="text">    {</text>
      <text x="0" y="150" class="text">      "id": "src/main.py",</text>
      <text x="0" y="170" class="text">      "name": "main.py",</text>
      <text x="0" y="190" class="text">      "type": "file"</text>
    </g>
    <g class="line7">
      <text x="0" y="210" class="text">    }</text>
    </g>
    <g class="line8">
      <text x="0" y="230" class="text">  ],</text>
      <text x="0" y="250" class="text">  "edges": []</text>
      <text x="0" y="270" class="text">}</text>
    </g>
  </g>
</svg>
