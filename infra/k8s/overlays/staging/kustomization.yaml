apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: intentgraph-api

configMapGenerator:
  - name: intentgraph-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=info
